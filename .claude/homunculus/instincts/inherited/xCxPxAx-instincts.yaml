# XCxPxAx Workflow Add Or Update Hook Unit Tests

## Action

Follow the add-or-update-hook-unit-tests workflow:
1. Create or update test files in hooks/__tests__/, named after the hook being tested.
2. Mock external/native dependencies (e.g., expo-calendar, react-native/Alert) to isolate logic.
3. Add or update test cases for permission errors, missing dependencies, and exception handling.
4. Update the hook implementation file if necessary to facilitate testing (e.g., remove test-only exports, refactor for better testability).
5. Update package.json or lock files if new test dependencies are added.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: hooks/__tests__/*.test.ts, hooks/use*.ts, package.json

